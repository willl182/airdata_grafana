services:
  grafana-downloader:
    build:
      context: .
    image: grafana-downloader:local
    container_name: grafana-downloader
    ports:
      - "${WEBAPP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      API_HOST: 127.0.0.1
      API_PORT: 3001
      API_BASE_URL: http://127.0.0.1:3001
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http'); const check=(port,path)=>new Promise((resolve,reject)=>{const req=http.get({host:'127.0.0.1',port,path,timeout:3000},res=>{res.resume(); res.statusCode>=200&&res.statusCode<500?resolve():reject(new Error(String(res.statusCode)))}); req.on('error',reject); req.on('timeout',()=>req.destroy(new Error('timeout')))}); Promise.all([check(3001,'/api/health'),check(3000,'/')]).then(()=>process.exit(0),()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
